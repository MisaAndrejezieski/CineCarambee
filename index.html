<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineCarambee</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="icone">🐝</span>
            <h1>CineCarambee</h1>
        </div>
        <nav>
            <a href="index.html">Início</a>
            <a href="#">Catálogo</a>
            <a href="#">Sobre</a>
        </nav>
    </header>

    <main>
        <section class="destaque">
            <h2>Filme em Destaque</h2>
            <div class="player-destaque">
                <iframe 
                    src="https://archive.org/embed/the-princess-bride_202407" 
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <section class="grade-filmes">
            <h2>Catálogo</h2>
            <div class="grid">
                <!-- cards de filmes gerados dinamicamente -->
            </div>
        </section>
    </main>

    <footer>
        <p>🐝 CineCarambee — Cinema livre, sem frescura.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
